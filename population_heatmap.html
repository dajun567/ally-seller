<body>
<div id="map"></div>

<div class="panel" id="panel">
  <h1>🗺️ 贵阳居住人口热力</h1>
  <div class="sub">小区成交套数 × 入住率 × 户均人数 ≈ 估算居住人口</div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;">
    <button class="btn" id="btnStart" onclick="startGeocode()">🚀 开始地理编码</button>
    <button class="btn-sm" onclick="renderHeatmap()">📊 刷新热力图</button>
    <button class="btn-sm" onclick="clearCache()">🗑️ 清除缓存</button>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="status" id="status">准备就绪 · <span class="num" id="totalCount">0</span>/742 已编码</div>
</div>

<div class="stats" id="statsPanel">
  <div class="item"><span class="num" id="statPop">—</span><span class="lbl">估算总人口</span></div>
  <div class="item"><span class="num" id="statComm">—</span><span class="lbl">已定位小区</span></div>

</div>

<div class="legend">
  <span>低</span>
  <div class="grad" style="background:linear-gradient(to right, rgba(0,255,0,0.1), rgba(255,255,0,0.5), rgba(255,0,0,0.8))"></div>
  <span>高</span>
  <span style="margin-left:8px;">入住率 70% · 户均 2.8人</span>
</div>

<script>
const AMAP_KEY = 'd1f15ad3fdf0c704434eaf23c7c18698';

// Embedded community data
const COMMUNITIES = null; // Will be loaded from JSON

// Load community data
let communityData = [];
(function loadData() {
  const xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://dajun567.github.io/ally-seller/guiyang_data.json?' + Date.now(), true);
  xhr.onload = function() {
    if (xhr.status === 200) {
      try { communityData = JSON.parse(xhr.responseText).communities; } catch(e) {}
    }
    if (communityData.length === 0) {
      // Fallback: use inline data
      communityData = INLINE_DATA;
    }
    document.getElementById('totalCount').textContent = communityData.length;
    updateStats();
    // Try loading cached
    loadCache();
  };
  xhr.onerror = function() {
    communityData = INLINE_DATA;
    document.getElementById('totalCount').textContent = communityData.length;
    loadCache();
  };
  xhr.send();
})();

// Map
let map = null;
let heatmap = null;
let isGeocoding = false;
const CACHE_KEY = 'gy_pop_geo';

function initMap() {
  const script = document.createElement('script');
  script.src = `https://webapi.amap.com/maps?v=2.0&key=${AMAP_KEY}&plugin=AMap.Heatmap,AMap.Geocoder`;
  script.onload = function() {
    map = new AMap.Map('map', {
      center: [106.63, 26.65], zoom: 11,
      mapStyle: 'amap://styles/light',
    });
    heatmap = new AMap.Heatmap(map, {
      radius: 40, opacity: [0.1, 0.7], gradient: { 0.1:'#00ff00', 0.3:'#88ff00', 0.5:'#ffff00', 0.7:'#ff8800', 0.9:'#ff0000' }
    });
    loadCache();
  };
  document.head.appendChild(script);
}

function loadCache() {
  try {
    const cached = localStorage.getItem(CACHE_KEY);
    if (cached) {
      const data = JSON.parse(cached);
      document.getElementById('totalCount').textContent = communityData.length;
      document.getElementById('progressBar').style.width = (data.length / communityData.length * 100) + '%';
      document.getElementById('status').innerHTML = `已缓存 <span class="num">${data.length}</span>/${communityData.length} 个小区`;
      if (data.length > 10) renderHeatmap();
    }
  } catch(e) {}
}

function getCached() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY) || '[]'); } catch(e) { return []; }
}

function saveCache(data) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(data)); } catch(e) {}
}

async function startGeocode() {
  if (isGeocoding) return;
  isGeocoding = true;
  document.getElementById('btnStart').disabled = true;

  let cached = getCached();
  const cachedNames = new Set(cached.map(c => c.n));
  const todo = communityData.filter(c => !cachedNames.has(c.n));

  if (todo.length === 0) {
    document.getElementById('status').innerHTML = '✅ 全部已编码，可直接渲染热力图';
    document.getElementById('btnStart').disabled = false;
    isGeocoding = false;
    renderHeatmap();
    return;
  }

  const geocoder = new AMap.Geocoder({ city: '贵阳', batch: false });
  let success = 0, fail = 0;

  // Process in batches
  const BATCH = 5;
  for (let i = 0; i < todo.length; i += BATCH) {
    const batch = todo.slice(i, i + BATCH);

    await Promise.all(batch.map(async (c) => {
      try {
        const result = await new Promise((resolve, reject) => {
          geocoder.getLocation(c.n + (c.d ? ' ' + c.d : ''), (status, result) => {
            if (status === 'complete' && result.geocodes && result.geocodes.length > 0) {
              const loc = result.geocodes[0];
              resolve({ n: c.n, d: c.d, s: c.s, lat: loc.location.lat, lng: loc.location.lng });
            } else {
              reject('not found');
            }
          });
        });
        cached.push(result);
        success++;
      } catch(e) {
        // Try without district
        try {
          const result2 = await new Promise((resolve, reject) => {
            geocoder.getLocation('贵阳 ' + c.n, (status, result) => {
              if (status === 'complete' && result.geocodes && result.geocodes.length > 0) {
                const loc = result.geocodes[0];
                resolve({ n: c.n, d: c.d, s: c.s, lat: loc.location.lat, lng: loc.location.lng });
              } else {
                reject('not found');
              }
            });
          });
          cached.push(result2);
          success++;
        } catch(e2) {
          fail++;
        }
      }
    }));

    saveCache(cached);

    const pct = Math.min(100, Math.round(cached.length / communityData.length * 100));
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('totalCount').textContent = cached.length;
    document.getElementById('status').innerHTML =
      `编码中 · <span class="num">${cached.length}</span>/${communityData.length}` +
      ` · 成功 ${success} · 失败 ${fail}`;

    // Auto-render periodically
    if (cached.length % 50 === 0) renderHeatmap();
  }

  document.getElementById('status').innerHTML =
    `✅ 完成 · 成功 <span class="num">${success}</span> · 失败 <span class="num">${fail}</span> · 共 <span class="num">${cached.length}</span> 个小区`;
  document.getElementById('btnStart').disabled = false;
  isGeocoding = false;
  renderHeatmap();
}

function renderHeatmap() {
  const cached = getCached();
  if (cached.length === 0) { alert('还没有地理编码数据，请先点击"开始地理编码"'); return; }

  // Population calc: sold * occupancy * persons_per_household
  const OCCUPANCY_TOP = 0.85;  // Top 50 communities
  const OCCUPANCY_NORMAL = 0.70;
  const PPH = 2.8;

  // Sort by sold count to determine top
  const sorted = [...cached].sort((a, b) => b.s - a.s);
  const topNames = new Set(sorted.slice(0, 50).map(c => c.n));

  const points = cached.map(c => {
    const occ = topNames.has(c.n) ? OCCUPANCY_TOP : OCCUPANCY_NORMAL;
    const pop = c.s * occ * PPH;
    return {
      lng: c.lng, lat: c.lat,
      count: Math.round(pop / 20) // Normalize for heatmap intensity
    };
  }).filter(p => p.lng && p.lat);

  if (heatmap && map) {
    heatmap.setDataSet({
      data: points.map(p => ({ lng: p.lng, lat: p.lat, count: Math.max(1, p.count) })),
      max: Math.max(...points.map(p => p.count), 100)
    });
    heatmap.show();
    // Fit view
    map.setFitView(null, false, [50, 50, 50, 50]);
  }

  // Update stats
  updateStats(cached);
}

function updateStats(cached) {
  const data = cached || getCached();
  const OCC_TOP = 0.85, OCC_NORM = 0.70, PPH = 2.8;
  const sorted = [...data].sort((a,b) => b.s - a.s);
  const topNames = new Set(sorted.slice(0,50).map(c=>c.n));
  let totalPop = 0, areaSet = new Set();
  data.forEach(c => {
    const occ = topNames.has(c.n) ? OCC_TOP : OCC_NORM;
    totalPop += c.s * occ * PPH;
    if (c.d) areaSet.add(c.d);
  });
  document.getElementById('statPop').textContent = (totalPop / 10000).toFixed(1) + '万';
  document.getElementById('statComm').textContent = data.length;
  document.getElementById('statArea').textContent = areaSet.size + '区';
}

function clearCache() {
  if (!confirm('确定清除所有已缓存的地理编码数据？')) return;
  localStorage.removeItem(CACHE_KEY);
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('status').innerHTML = '已清除缓存，可重新开始编码';
  document.getElementById('totalCount').textContent = '0';
}
